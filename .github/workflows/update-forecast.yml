name: 出船予報データ更新

on:
  schedule:
    # 日本時間 6時・9時・12時・15時・18時に実行（UTC -9h）
    - cron: '0 21,0,3,6,9 * * *'
  workflow_dispatch:   # GitHub画面から手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 海況・気象データ取得 → forecast_data.json に保存
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, sys
          from datetime import datetime, timezone

          LAT, LON, DAYS = 33.2, 134.2, 5
          TARGET_HOURS = [6, 9, 12]

          def fetch_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "muroto-forecast/1.0"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode())

          print("Marine API 取得中...")
          marine = fetch_json(
              f"https://marine-api.open-meteo.com/v1/marine"
              f"?latitude={LAT}&longitude={LON}"
              f"&hourly=wave_height"
              f"&timezone=Asia/Tokyo&forecast_days={DAYS}"
          )

          print("Weather API 取得中...")
          weather = fetch_json(
              f"https://api.open-meteo.com/v1/forecast"
              f"?latitude={LAT}&longitude={LON}"
              f"&hourly=wind_speed_10m,wind_direction_10m,precipitation"
              f"&wind_speed_unit=ms&timezone=Asia/Tokyo&forecast_days={DAYS}"
          )

          m_times = marine["hourly"]["time"]
          m_wave  = marine["hourly"]["wave_height"]
          w_times = weather["hourly"]["time"]
          w_wind  = weather["hourly"]["wind_speed_10m"]
          w_dir   = weather["hourly"]["wind_direction_10m"]
          w_rain  = weather["hourly"]["precipitation"]

          wmap = {t: i for i, t in enumerate(w_times)}

          rows = []
          for i, t in enumerate(m_times):
              hour = int(t[11:13])
              if hour not in TARGET_HOURS:
                  continue
              wi = wmap.get(t)
              if wi is None:
                  continue
              wave = m_wave[i]
              wind = w_wind[wi]
              if wave is None or wind is None:
                  continue
              rows.append({
                  "t":    t,
                  "wave": round(float(wave), 2),
                  "wind": round(float(wind), 1),
                  "dir":  int(w_dir[wi] or 0),
                  "rain": round(float(w_rain[wi] or 0), 1)
              })

          output = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "rows": rows
          }

          with open("forecast_data.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False)

          print(f"✓ {len(rows)} 件保存完了")
          PYEOF

      - name: forecast_data.json をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecast_data.json
          git diff --staged --quiet && echo "変更なし" || \
            git commit -m "🌊 予報データ更新 $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
